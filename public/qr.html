<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark light" />
  <title>WhatsApp QR</title>
  <style>
    html[data-theme="dark"] {
      color-scheme: dark;
      --bg: #0f1419;
      --card: #1a2332;
      --text: #e7ecf3;
      --muted: #8b9bb4;
      --accent: #3b82f6;
      --border: #2d3a4f;
      --btn-bg: #2d3a4f;
      --banner-bg: #422006;
      --banner-text: #fed7aa;
      --ok: #4ade80;
    }
    html[data-theme="light"] {
      color-scheme: light;
      --bg: #f1f5f9;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --accent: #2563eb;
      --border: #e2e8f0;
      --btn-bg: #e2e8f0;
      --banner-bg: #fff7ed;
      --banner-text: #9a3412;
      --ok: #15803d;
    }
    * { box-sizing: border-box; }
    body { font-family: system-ui, Segoe UI, Roboto, sans-serif; margin: 0; background: var(--bg); color: var(--text); min-height: 100vh; }
    body.rtl { direction: rtl; }
    .wrap { max-width: 480px; margin: 0 auto; padding: 1.5rem; text-align: center; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; }
    h1 { font-size: 1.25rem; margin: 0 0 1rem; }
    img { max-width: 100%; height: auto; border-radius: 8px; background: #fff; padding: 0.5rem; }
    p { color: var(--muted); line-height: 1.5; font-size: 0.95rem; }
    .detail { font-size: 0.8rem; color: var(--muted); margin-top: 0.75rem; word-break: break-word; font-family: ui-monospace, monospace; opacity: 0.9; }
    .ok { color: var(--ok); font-weight: 600; }
    a { color: var(--accent); }
    .toolbar { margin-bottom: 1rem; display: flex; justify-content: center; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
    select { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 0.45rem 0.65rem; border-radius: 8px; font-size: 0.9rem; }
    button { background: var(--btn-bg); color: var(--text); border: 1px solid var(--border); padding: 0.45rem 0.85rem; border-radius: 8px; cursor: pointer; }
    .banner { background: var(--banner-bg); color: var(--banner-text); padding: 0.65rem; border-radius: 8px; margin-bottom: 1rem; font-size: 0.9rem; text-align: start; }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0; }
  </style>
  <script>
    (function () {
      try {
        var k = "dashTheme";
        var p = localStorage.getItem(k) || "dark";
        var e = p === "auto" ? (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light") : p === "light" ? "light" : "dark";
        document.documentElement.setAttribute("data-theme", e);
      } catch (err) {}
    })();
  </script>
</head>
<body>
  <div class="wrap">
    <div class="toolbar">
      <a href="/dashboard" id="dashLink">Dashboard</a>
      <button type="button" id="btnLang">עב / EN</button>
    </div>
    <div class="banner hidden" id="authBanner"></div>
    <div class="card">
      <h1 id="title">WhatsApp login</h1>
      <p id="sub">Scan with WhatsApp → Linked devices</p>
      <div id="content"></div>
    </div>
  </div>
  <script>
(function () {
  const T = {
    en: {
      title: "WhatsApp login",
      sub: "Open WhatsApp on your phone → Settings → Linked devices → Link a device, then scan the code below.",
      connected: "Connected — session is active.",
      waiting: "Starting the WhatsApp client… If login is required, a QR code will appear here within 1–2 minutes. Keep this page open.",
      disconnected: "Session disconnected or still reconnecting. A QR will show when the server is ready — wait up to ~2 minutes, or check Render logs if nothing appears.",
      detailPrefix: "Server status:",
      dash: "Dashboard",
      authHint: "Unauthorized. Open /login or save the token on the dashboard.",
      themeLabel: "Theme",
      theme_dark: "Dark",
      theme_light: "Light",
      theme_auto: "System",
    },
    he: {
      title: "התחברות לוואטסאפ",
      sub: "בטלפון: וואטסאפ → הגדרות → מכשירים מקושרים → קישור מכשיר, וסרקו את הקוד למטה.",
      connected: "מחובר — הסשן פעיל.",
      waiting: "מפעיל את לקוח וואטסאפ… אם נדרשת התחברות, יופיע QR תוך דקה–שתיים. השאירו את הדף פתוח.",
      disconnected: "הסשן התנתק או מתחבר מחדש. QR יופיע כשהשרת מוכן — המתינו עד כ־2 דקות, או בדקו לוגים ב-Render אם לא מופיע.",
      detailPrefix: "סטטוס שרת:",
      dash: "לוח בקרה",
      authHint: "אין הרשאה. פתחו /login או שמרו טוקן בלוח הבקרה.",
    },
  };
  function lang() { return localStorage.getItem("dashLang") || "en"; }
  function t(k) { return T[lang()][k] || k; }
  function applyLang() {
    document.documentElement.lang = lang();
    document.body.classList.toggle("rtl", lang() === "he");
    document.getElementById("title").textContent = t("title");
    document.getElementById("sub").textContent = t("sub");
    document.getElementById("dashLink").textContent = t("dash");
    document.getElementById("dashLink").href = "/dashboard";
  }
  function getToken() {
    return localStorage.getItem("dashboardToken") || "";
  }
  async function migrateUrlTokenToCookie() {
    const q = new URLSearchParams(location.search).get("token");
    if (!q) return;
    try {
      const res = await fetch("/api/auth/dashboard-session", {
        method: "POST",
        headers: { "Content-Type": "application/json", Accept: "application/json" },
        credentials: "include",
        body: JSON.stringify({ token: q }),
      });
      if (res.ok) {
        history.replaceState({}, "", location.pathname + location.hash);
      }
    } catch (err) {}
  }
  function headers() {
    const h = { Accept: "application/json" };
    const tok = getToken();
    if (tok) h["x-dashboard-token"] = tok;
    return h;
  }
  const el = document.getElementById("content");
  let timer;
  async function poll() {
    try {
      const res = await fetch("/api/whatsapp/qr", { credentials: "include", headers: headers() });
      if (res.status === 401) {
        document.getElementById("authBanner").textContent = t("authHint");
        document.getElementById("authBanner").classList.remove("hidden");
        el.innerHTML = "";
        return;
      }
      document.getElementById("authBanner").classList.add("hidden");
      const data = await res.json();
      if (data.ready) {
        el.innerHTML = '<p class="ok">' + escapeHtml(t("connected")) + "</p>";
        return;
      }
      if (data.qrDataUrl) {
        el.innerHTML = '<img src="' + data.qrDataUrl + '" alt="QR code" width="320" height="320" />';
        return;
      }
      let msg = t("waiting");
      if (data.lastDisconnectReason) msg = t("disconnected");
      let html = "<p>" + escapeHtml(msg) + "</p>";
      if (data.lastDisconnectReason) {
        html +=
          '<p class="detail">' +
          escapeHtml(t("detailPrefix")) +
          " " +
          escapeHtml(String(data.lastDisconnectReason)) +
          "</p>";
      }
      el.innerHTML = html;
    } catch {
      el.innerHTML = "<p>" + escapeHtml(t("waiting")) + "</p>";
    }
  }
  function escapeHtml(s) {
    const d = document.createElement("div");
    d.textContent = s;
    return d.innerHTML;
  }
  document.getElementById("btnLang").addEventListener("click", () => {
    localStorage.setItem("dashLang", lang() === "en" ? "he" : "en");
    applyLang();
  });
  (async function initQr() {
    await migrateUrlTokenToCookie();
    getToken();
    applyLang();
    poll();
    timer = setInterval(poll, 2500);
  })();
})();
  </script>
</body>
</html>

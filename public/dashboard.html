<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark light" />
  <title>Leads</title>
  <style>
    html[data-theme="dark"] {
      color-scheme: dark;
      --bg: #0f1419;
      --card: #1a2332;
      --text: #e7ecf3;
      --muted: #8b9bb4;
      --accent: #3b82f6;
      --border: #2d3a4f;
      --btn-secondary-bg: #2d3a4f;
      --banner-bg: #422006;
      --banner-text: #fed7aa;
    }
    html[data-theme="light"] {
      color-scheme: light;
      --bg: #f1f5f9;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --accent: #2563eb;
      --border: #e2e8f0;
      --btn-secondary-bg: #e2e8f0;
      --banner-bg: #fff7ed;
      --banner-text: #9a3412;
    }
    * { box-sizing: border-box; }
    body { font-family: system-ui, Segoe UI, Roboto, sans-serif; margin: 0; background: var(--bg); color: var(--text); min-height: 100vh; }
    body.rtl { direction: rtl; }
    .no-print { }
    @media print {
      .no-print { display: none !important; }
      body { background: #fff; color: #000; }
      table { font-size: 11px; }
      .print-wrap { box-shadow: none !important; }
    }
    .wrap { max-width: 1400px; margin: 0 auto; padding: 1rem 1.25rem 3rem; }
    .print-wrap { background: var(--card); border-radius: 12px; border: 1px solid var(--border); padding: 1rem 1.25rem; overflow-x: auto; }
    header { display: flex; flex-wrap: wrap; align-items: center; gap: 0.75rem; margin-bottom: 1rem; }
    h1 { font-size: 1.35rem; margin: 0; flex: 1; min-width: 8rem; }
    .toolbar { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; }
    input[type="search"], select, input[type="password"], input[type="text"], textarea {
      background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 0.45rem 0.65rem; border-radius: 8px; font-size: 0.9rem;
    }
    textarea.notes-input { width: 100%; min-width: 10rem; max-width: 16rem; min-height: 3.2rem; resize: vertical; font-family: inherit; }
    .service-types { display: flex; flex-direction: column; gap: 0.25rem; min-width: 11rem; max-width: 14rem; }
    .service-types label { display: flex; align-items: flex-start; gap: 0.35rem; font-size: 0.8rem; line-height: 1.25; cursor: pointer; font-weight: normal; text-transform: none; letter-spacing: normal; color: var(--text); }
    .service-types input { margin-top: 0.2rem; flex-shrink: 0; }
    th.nosort { cursor: default; }
    th.nosort:hover { color: var(--muted); }
    input[type="search"] { min-width: 12rem; }
    button, .btn {
      background: var(--accent); color: #fff; border: none; padding: 0.45rem 0.85rem; border-radius: 8px; cursor: pointer; font-size: 0.9rem; text-decoration: none; display: inline-block;
    }
    button.secondary { background: var(--btn-secondary-bg); color: var(--text); border: 1px solid var(--border); }
    a.nav { color: var(--accent); }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: start; padding: 0.55rem 0.5rem; border-bottom: 1px solid var(--border); vertical-align: top; }
    th { cursor: pointer; user-select: none; color: var(--muted); font-weight: 600; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.03em; }
    th:hover { color: var(--text); }
    th.sorted::after { content: " ▲"; opacity: 0.6; font-size: 0.7em; }
    th.sorted.desc::after { content: " ▼"; }
    select.status-select { min-width: 11rem; max-width: 100%; }
    .msg { white-space: pre-wrap; word-break: break-word; max-width: 22rem; font-size: 0.88rem; }
    .banner { background: var(--banner-bg); color: var(--banner-text); padding: 0.65rem 1rem; border-radius: 8px; margin-bottom: 1rem; font-size: 0.9rem; }
    .token-row { margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border); font-size: 0.85rem; color: var(--muted); }
    .btn-danger { background: #991b1b; color: #fff; border: 1px solid #b91c1c; font-size: 0.8rem; padding: 0.35rem 0.55rem; }
    html[data-theme="light"] .btn-danger { background: #dc2626; }
    .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .modal { background: var(--card); color: var(--text); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; max-width: 28rem; width: 100%; max-height: 90vh; overflow-y: auto; }
    .modal h2 { margin: 0 0 1rem; font-size: 1.1rem; }
    .modal label { display: block; margin-bottom: 0.75rem; font-size: 0.9rem; }
    .modal input, .modal textarea { width: 100%; margin-top: 0.25rem; }
    .modal textarea { min-height: 4rem; resize: vertical; }
    .modal-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 1rem; }
    .hidden { display: none !important; }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0; }
  </style>
  <script>
    (function () {
      try {
        var k = "dashTheme";
        var p = localStorage.getItem(k) || "dark";
        var e = p === "auto" ? (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light") : p === "light" ? "light" : "dark";
        document.documentElement.setAttribute("data-theme", e);
      } catch (err) {}
    })();
  </script>
</head>
<body>
  <div class="wrap">
    <div class="no-print banner hidden" id="authBanner" role="alert"></div>
    <header class="no-print">
      <h1 id="pageTitle">Leads</h1>
      <div class="toolbar">
        <label><span class="sr-only" id="searchLabel">Search</span>
          <input type="search" id="search" placeholder="" autocomplete="off" aria-labelledby="searchLabel" />
        </label>
        <label><span class="sr-only" id="filterLabel">Status</span>
          <select id="statusFilter" aria-labelledby="filterLabel"></select>
        </label>
        <label><span class="sr-only" id="themeLabel">Theme</span>
          <select id="themeSelect" aria-labelledby="themeLabel"></select>
        </label>
        <button type="button" id="btnAddLead" class="secondary">Add lead</button>
        <button type="button" id="btnPrint" class="secondary">Print</button>
        <button type="button" id="btnExportExcel" class="secondary">Export Excel</button>
        <button type="button" id="btnLang" class="secondary" aria-label="Toggle language">עב / EN</button>
        <a class="btn secondary nav" id="linkQr" href="/qr">QR</a>
      </div>
    </header>
    <div class="print-wrap" id="printArea">
      <div id="empty" class="hidden" style="color:var(--muted);padding:1rem;">—</div>
      <table id="table" class="hidden">
        <thead>
          <tr>
            <th data-sort="phone" id="thPhone">Phone</th>
            <th data-sort="name" id="thName">Name</th>
            <th data-sort="firstMessage" id="thMsg">Message</th>
            <th data-sort="status" id="thStatus">Status</th>
            <th class="nosort" id="thServices">Service types</th>
            <th class="nosort" id="thNotes">Notes</th>
            <th data-sort="createdAt" id="thDate">Created</th>
            <th class="nosort" id="thActions">Actions</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="no-print token-row">
      <label><span id="tokenLabel">Access token (if required)</span>
        <input type="password" id="tokenInput" style="margin-inline-start:0.5rem;width:14rem;" autocomplete="off" />
        <button type="button" id="btnSaveToken" class="secondary" style="margin-inline-start:0.35rem;">Save</button>
      </label>
    </div>
    <div id="modalBackdrop" class="modal-backdrop hidden no-print" role="presentation" aria-hidden="true">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <h2 id="modalTitle">Add lead</h2>
        <form id="formAddLead">
          <label><span id="lblAddPhone">Phone</span>
            <input type="text" name="phone" id="addPhone" required autocomplete="tel" inputmode="numeric" />
          </label>
          <label><span id="lblAddName">Name</span>
            <input type="text" name="name" id="addName" autocomplete="name" />
          </label>
          <label><span id="lblAddMsg">First message</span>
            <textarea name="firstMessage" id="addFirstMessage" required rows="3"></textarea>
          </label>
          <div class="modal-actions">
            <button type="submit" id="btnSubmitAdd">Save</button>
            <button type="button" class="secondary" id="btnCancelAdd">Cancel</button>
          </div>
        </form>
      </div>
    </div>
  </div>
  <script>
(function () {
  const STATUS_KEYS = ["none", "didnt_answer", "not_interested", "callback_later", "waiting_more_details", "waiting_client_details"];
  const SERVICE_TYPE_KEYS = ["business_card", "landing_page", "website", "lead_management_system", "ai_agent"];

  const T = {
    en: {
      title: "Leads",
      phone: "Phone",
      name: "Name",
      firstMessage: "First message",
      status: "Status",
      notes: "Notes",
      serviceTypes: "Service types",
      createdAt: "Created",
      searchPh: "Search phone, name, message, notes…",
      filterStatus: "All statuses",
      print: "Print",
      exportExcel: "Export Excel",
      exportEmpty: "No visible rows to export. Adjust filters or search.",
      themeLabel: "Theme",
      theme_dark: "Dark",
      theme_light: "Light",
      theme_auto: "System",
      linkQr: "WhatsApp QR",
      noLeads: "No leads yet.",
      noMatches: "No rows match your filters.",
      loadError: "Could not load leads.",
      authHint: "Open /login and sign in, or paste the token below and click Save (sets a secure session cookie).",
      authApi401: "Not signed in or session invalid. Open /login and connect again, or paste the token below and click Save.",
      tokenLabel: "Access token (if server uses DASHBOARD_TOKEN)",

      tokenSaveFailed: "Could not save token. Check it matches DASHBOARD_TOKEN.",
      addLead: "Add lead",
      addLeadTitle: "Add lead manually",
      actions: "Actions",
      removeLead: "Remove",
      deleteConfirm: "Remove this lead from the list? It will stay hidden and WhatsApp will not add it again for this phone number.",
      cancel: "Cancel",
      save: "Save",
      duplicatePhone: "A lead with this phone number already exists.",
      addLeadError: "Could not save the lead.",
      statuses: {
        none: "—",
        didnt_answer: "Didn't answer",
        not_interested: "Not interested",
        callback_later: "Call back later",
        waiting_more_details: "Client waiting for more details",
        waiting_client_details: "Waiting for more details from the client",
      },
      services: {
        business_card: "Business card",
        landing_page: "Landing page",
        website: "Website",
        lead_management_system: "Lead management system",
        ai_agent: "AI agent",
      },
    },
    he: {
      title: "לידים",
      phone: "טלפון",
      name: "שם",
      firstMessage: "הודעה ראשונה",
      status: "סטטוס",
      notes: "הערות",
      serviceTypes: "סוג שירות",
      createdAt: "נוצר",
      searchPh: "חיפוש טלפון, שם, הודעה, הערות…",
      filterStatus: "כל הסטטוסים",
      print: "הדפסה",
      exportExcel: "ייצוא לאקסל",
      exportEmpty: "אין שורות לייצוא. שינו סינון או חיפוש.",
      themeLabel: "ערכת נושא",
      theme_dark: "כהה",
      theme_light: "בהיר",
      theme_auto: "לפי המערכת",
      linkQr: "QR וואטסאפ",
      noLeads: "אין לידים עדיין.",
      noMatches: "אין תוצאות לפי הסינון.",
      loadError: "לא ניתן לטעון לידים.",
      authHint: "פתחו /login והתחברו, או הדביקו את הטוקן למטה ולחצו שמירה (ייווצר עוגיית סשן מאובטחת).",
      authApi401: "אין סשן או שהסשן פג תוקף. פתחו /login והתחברו שוב, או הדביקו את הטוקן למטה ולחצו שמירה.",
      tokenLabel: "טוקן גישה (אם השרת משתמש ב-DASHBOARD_TOKEN)",
      saveToken: "שמור",
      tokenSaveFailed: "לא ניתן לשמור את הטוקן. ודאו שהוא תואם ל-DASHBOARD_TOKEN.",
      addLead: "הוספת ליד",
      addLeadTitle: "הוספת ליד ידנית",
      actions: "פעולות",
      removeLead: "הסרה",
      deleteConfirm: "להסיר את הליד מהרשימה? הוא יישאר מוסתר ולא יתווסף שוב מוואטסאפ לאותו מספר.",
      cancel: "ביטול",
      save: "שמירה",
      duplicatePhone: "כבר קיים ליד עם מספר טלפון זה.",
      addLeadError: "לא ניתן לשמור את הליד.",
      statuses: {
        none: "—",
        didnt_answer: "לא ענה",
        not_interested: "לא מעוניין",
        callback_later: "להתקשר יותר מאוחר",
        waiting_more_details: "לקוח ממתין לפרטים נוספים ממני",
        waiting_client_details: "אני ממתין לפרטים נוספים מהלקוח",
      },
      services: {
        business_card: "כרטיס ביקור",
        landing_page: "דף נחיתה",
        website: "אתר",
        lead_management_system: "מערכת ניהול לידים",
        ai_agent: "סוכן AI",
      },
    },
  };

  function getLang() {
    return localStorage.getItem("dashLang") || "en";
  }
  function setLang(l) {
    localStorage.setItem("dashLang", l);
    document.documentElement.lang = l;
    document.body.classList.toggle("rtl", l === "he");
    applyI18n();
  }
  function t(key) {
    const l = getLang();
    const parts = key.split(".");
    let o = T[l];
    for (const p of parts) o = o && o[p];
    return o != null ? o : key;
  }
  function statusLabel(key) {
    return T[getLang()].statuses[key] || key;
  }
  function serviceLabel(key) {
    return T[getLang()].services[key] || key;
  }

  const THEME_KEY = "dashTheme";
  const THEME_PREFS = ["dark", "light", "auto"];

  function getEffectiveTheme() {
    const pref = localStorage.getItem(THEME_KEY) || "dark";
    if (pref === "auto") {
      return window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
    }
    return pref === "light" ? "light" : "dark";
  }

  function applyTheme() {
    document.documentElement.setAttribute("data-theme", getEffectiveTheme());
  }

  let themeMediaBound = false;
  function bindThemeMediaQuery() {
    if (themeMediaBound) return;
    themeMediaBound = true;
    window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", () => {
      if ((localStorage.getItem(THEME_KEY) || "dark") === "auto") applyTheme();
    });
  }

  function applyI18n() {
    document.getElementById("pageTitle").textContent = t("title");
    document.getElementById("thPhone").textContent = t("phone");
    document.getElementById("thName").textContent = t("name");
    document.getElementById("thMsg").textContent = t("firstMessage");
    document.getElementById("thStatus").textContent = t("status");
    document.getElementById("thServices").textContent = t("serviceTypes");
    document.getElementById("thNotes").textContent = t("notes");
    document.getElementById("thDate").textContent = t("createdAt");
    document.getElementById("thActions").textContent = t("actions");
    document.getElementById("search").placeholder = t("searchPh");
    document.getElementById("themeLabel").textContent = t("themeLabel");
    document.getElementById("btnAddLead").textContent = t("addLead");
    document.getElementById("btnPrint").textContent = t("print");
    document.getElementById("btnExportExcel").textContent = t("exportExcel");
    document.getElementById("linkQr").textContent = t("linkQr");
    document.getElementById("tokenLabel").textContent = t("tokenLabel");
    document.getElementById("btnSaveToken").textContent = t("saveToken");
    document.getElementById("modalTitle").textContent = t("addLeadTitle");
    document.getElementById("lblAddPhone").textContent = t("phone");
    document.getElementById("lblAddName").textContent = t("name");
    document.getElementById("lblAddMsg").textContent = t("firstMessage");
    document.getElementById("btnSubmitAdd").textContent = t("save");
    document.getElementById("btnCancelAdd").textContent = t("cancel");
    const ff = document.getElementById("statusFilter");
    const cur = ff.value;
    ff.innerHTML = "";
    const opt0 = document.createElement("option");
    opt0.value = "";
    opt0.textContent = t("filterStatus");
    ff.appendChild(opt0);
    STATUS_KEYS.forEach((k) => {
      const o = document.createElement("option");
      o.value = k;
      o.textContent = statusLabel(k);
      ff.appendChild(o);
    });
    ff.value = cur;
    const ts = document.getElementById("themeSelect");
    const curTheme = localStorage.getItem(THEME_KEY) || "dark";
    ts.innerHTML = "";
    THEME_PREFS.forEach((k) => {
      const o = document.createElement("option");
      o.value = k;
      o.textContent = t("theme_" + k);
      ts.appendChild(o);
    });
    ts.value = THEME_PREFS.includes(curTheme) ? curTheme : "dark";
    applyTheme();
    bindThemeMediaQuery();
    renderTable();
  }

  function getToken() {
    return localStorage.getItem("dashboardToken") || "";
  }

  /** Legacy: ?token= in URL → exchange for HttpOnly cookie and strip query (no secret left in address bar). */
  async function migrateUrlTokenToCookie() {
    const q = new URLSearchParams(location.search).get("token");
    if (!q) return;
    try {
      const res = await fetch("/api/auth/dashboard-session", {
        method: "POST",
        headers: { "Content-Type": "application/json", Accept: "application/json" },
        credentials: "include",
        body: JSON.stringify({ token: q }),
      });
      if (res.ok) {
        history.replaceState({}, "", location.pathname + location.hash);
      }
    } catch (err) {}
  }

  function authHeaders() {
    const tok = getToken();
    const h = { Accept: "application/json", "Content-Type": "application/json" };
    if (tok) h["x-dashboard-token"] = tok;
    return h;
  }

  let leads = [];
  /** True when /api/leads returned 401 — must not show as "no leads". */
  let sessionUnauthorized = false;
  let sortKey = "createdAt";
  let sortDir = "desc";

  function getVisibleLeads() {
    return sortLeads(filteredLeads());
  }

  function csvEscape(value) {
    const s = value == null ? "" : String(value);
    if (/[",\r\n]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
    return s;
  }

  function handleExportExcel() {
    const rows = getVisibleLeads();
    if (!rows.length) {
      alert(t("exportEmpty"));
      return;
    }
    const headers = [
      t("phone"),
      t("name"),
      t("firstMessage"),
      t("status"),
      t("serviceTypes"),
      t("notes"),
      t("createdAt"),
    ];
    const lines = [headers.map(csvEscape).join(",")];
    rows.forEach((row) => {
      const st = (row.serviceTypes || []).map((k) => serviceLabel(k)).join("; ");
      const created = row.createdAt ? new Date(row.createdAt).toLocaleString() : "";
      const status = statusLabel(row.status || "none");
      lines.push(
        [
          csvEscape(row.phone || ""),
          csvEscape(row.name || ""),
          csvEscape(row.firstMessage || ""),
          csvEscape(status),
          csvEscape(st),
          csvEscape(row.notes || ""),
          csvEscape(created),
        ].join(",")
      );
    });
    const bom = "\ufeff";
    const blob = new Blob([bom + lines.join("\r\n")], { type: "text/csv;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const stamp = new Date().toISOString().slice(0, 19).replace(/:/g, "-");
    a.href = url;
    a.download = "leads-" + stamp + ".csv";
    a.rel = "noopener";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function sortLeads(list) {
    const dir = sortDir === "asc" ? 1 : -1;
    return [...list].sort((a, b) => {
      let va = a[sortKey];
      let vb = b[sortKey];
      if (sortKey === "createdAt") {
        va = new Date(va).getTime();
        vb = new Date(vb).getTime();
      } else if (sortKey === "serviceTypes") {
        va = (Array.isArray(a.serviceTypes) ? a.serviceTypes : []).slice().sort().join(",");
        vb = (Array.isArray(b.serviceTypes) ? b.serviceTypes : []).slice().sort().join(",");
      } else {
        va = String(va || "").toLowerCase();
        vb = String(vb || "").toLowerCase();
      }
      if (va < vb) return -1 * dir;
      if (va > vb) return 1 * dir;
      return 0;
    });
  }

  function filteredLeads() {
    const q = document.getElementById("search").value.trim().toLowerCase();
    const sf = document.getElementById("statusFilter").value;
    return leads.filter((row) => {
      if (sf && (row.status || "none") !== sf) return false;
      if (!q) return true;
      const st = (row.serviceTypes || []).map((k) => serviceLabel(k)).join(" ");
      const blob = [row.phone, row.name, row.firstMessage, row.notes || "", st].join(" ").toLowerCase();
      return blob.includes(q);
    });
  }

  function renderTable() {
    const tbody = document.getElementById("tbody");
    const table = document.getElementById("table");
    const empty = document.getElementById("empty");
    if (sessionUnauthorized) {
      table.classList.add("hidden");
      empty.classList.remove("hidden");
      empty.textContent = t("authApi401");
      const banner = document.getElementById("authBanner");
      banner.textContent = t("authApi401");
      banner.classList.remove("hidden");
      return;
    }
    const rows = sortLeads(filteredLeads());
    document.querySelectorAll("th[data-sort]").forEach((th) => {
      th.classList.remove("sorted", "desc");
      if (th.dataset.sort === sortKey) {
        th.classList.add("sorted");
        if (sortDir === "desc") th.classList.add("desc");
      }
    });
    if (!leads.length) {
      table.classList.add("hidden");
      empty.classList.remove("hidden");
      empty.textContent = t("noLeads");
      return;
    }
    if (!rows.length) {
      table.classList.add("hidden");
      tbody.innerHTML = "";
      empty.classList.remove("hidden");
      empty.textContent = t("noMatches");
      return;
    }
    empty.classList.add("hidden");
    table.classList.remove("hidden");
    tbody.innerHTML = rows
      .map((row) => {
        const id = row._id;
        const st = row.status || "none";
        const opts = STATUS_KEYS.map(
          (k) => `<option value="${k}"${k === st ? " selected" : ""}>${escapeHtml(statusLabel(k))}</option>`
        ).join("");
        const date = row.createdAt ? new Date(row.createdAt).toLocaleString() : "";
        const notesVal = escapeHtml(row.notes || "");
        const svc = Array.isArray(row.serviceTypes) ? row.serviceTypes : [];
        const checks = SERVICE_TYPE_KEYS.map((k) => {
          const idCh = "svc-" + id + "-" + k;
          return `<label><input type="checkbox" class="svc-cb" data-lead-id="${id}" data-svc="${k}" id="${idCh}"${svc.includes(k) ? " checked" : ""} /><span>${escapeHtml(serviceLabel(k))}</span></label>`;
        }).join("");
        return `<tr data-id="${id}">
          <td>${escapeHtml(row.phone || "")}</td>
          <td>${escapeHtml(row.name || "")}</td>
          <td class="msg">${escapeHtml(row.firstMessage || "")}</td>
          <td><select class="status-select" data-id="${id}" aria-label="${escapeHtml(t("status"))}">${opts}</select></td>
          <td><div class="service-types" role="group" aria-label="${escapeHtml(t("serviceTypes"))}">${checks}</div></td>
          <td><textarea class="notes-input" data-id="${id}" rows="2" aria-label="${escapeHtml(t("notes"))}">${notesVal}</textarea></td>
          <td>${escapeHtml(date)}</td>
          <td class="no-print"><button type="button" class="btn-danger remove-lead-btn" data-id="${id}">${escapeHtml(t("removeLead"))}</button></td>
        </tr>`;
      })
      .join("");
    tbody.querySelectorAll(".status-select").forEach((sel) => {
      sel.addEventListener("change", onStatusChange);
    });
    tbody.querySelectorAll(".svc-cb").forEach((cb) => {
      cb.addEventListener("change", onServiceTypesChange);
    });
    tbody.querySelectorAll(".notes-input").forEach((ta) => {
      ta.addEventListener("blur", onNotesBlur);
    });
    tbody.querySelectorAll(".remove-lead-btn").forEach((btn) => {
      btn.addEventListener("click", onRemoveLeadClick);
    });
  }

  function escapeHtml(s) {
    const d = document.createElement("div");
    d.textContent = s;
    return d.innerHTML;
  }

  async function patchLead(id, body) {
    const res = await fetch("/api/leads/" + id, {
      method: "PATCH",
      credentials: "include",
      headers: authHeaders(),
      body: JSON.stringify(body),
    });
    if (!res.ok) throw new Error(String(res.status));
    const data = await res.json();
    const idx = leads.findIndex((l) => l._id === id);
    if (idx >= 0) leads[idx] = data.lead;
    return data.lead;
  }

  async function onRemoveLeadClick(e) {
    const id = e.target && e.target.dataset && e.target.dataset.id;
    if (!id || !window.confirm(t("deleteConfirm"))) return;
    try {
      const res = await fetch("/api/leads/" + encodeURIComponent(id), {
        method: "DELETE",
        credentials: "include",
        headers: authHeaders(),
      });
      if (!res.ok) throw new Error();
      await loadLeads();
    } catch (err) {
      alert(t("loadError"));
    }
  }

  async function onStatusChange(e) {
    const sel = e.target;
    const id = sel.dataset.id;
    const status = sel.value;
    sel.disabled = true;
    try {
      await patchLead(id, { status });
    } catch (err) {
      alert(t("loadError"));
      await loadLeads();
    } finally {
      sel.disabled = false;
    }
  }

  function collectServiceTypesForRow(leadId) {
    const row = document.querySelector(`tr[data-id="${leadId}"]`);
    if (!row) return [];
    const selected = [];
    row.querySelectorAll(".svc-cb:checked").forEach((cb) => selected.push(cb.dataset.svc));
    return SERVICE_TYPE_KEYS.filter((k) => selected.includes(k));
  }

  async function onServiceTypesChange(e) {
    const cb = e.target;
    const id = cb.dataset.leadId;
    const serviceTypes = collectServiceTypesForRow(id);
    const cbs = document.querySelectorAll(`tr[data-id="${id}"] .svc-cb`);
    cbs.forEach((x) => { x.disabled = true; });
    try {
      await patchLead(id, { serviceTypes });
    } catch (err) {
      alert(t("loadError"));
      await loadLeads();
    } finally {
      cbs.forEach((x) => { x.disabled = false; });
    }
  }

  async function onNotesBlur(e) {
    const ta = e.target;
    const id = ta.dataset.id;
    const notes = ta.value;
    const prev = (leads.find((l) => l._id === id) || {}).notes || "";
    if (notes === prev) return;
    ta.disabled = true;
    try {
      await patchLead(id, { notes });
    } catch (err) {
      alert(t("loadError"));
      await loadLeads();
    } finally {
      ta.disabled = false;
    }
  }

  async function loadLeads() {
    const banner = document.getElementById("authBanner");
    banner.classList.add("hidden");
    try {
      const res = await fetch("/api/leads", { credentials: "include", headers: authHeaders() });
      if (res.status === 401) {
        sessionUnauthorized = true;
        leads = [];
        banner.textContent = t("authApi401");
        banner.classList.remove("hidden");
        document.getElementById("table").classList.add("hidden");
        document.getElementById("empty").classList.remove("hidden");
        document.getElementById("empty").textContent = t("authApi401");
        return;
      }
      sessionUnauthorized = false;
      if (!res.ok) throw new Error();
      const data = await res.json();
      leads = data.leads || [];
      renderTable();
    } catch {
      sessionUnauthorized = false;
      leads = [];
      document.getElementById("empty").classList.remove("hidden");
      document.getElementById("empty").textContent = t("loadError");
      document.getElementById("table").classList.add("hidden");
    }
  }

  document.getElementById("themeSelect").addEventListener("change", function () {
    localStorage.setItem(THEME_KEY, this.value);
    applyTheme();
  });
  document.getElementById("btnAddLead").addEventListener("click", openAddLeadModal);
  document.getElementById("btnCancelAdd").addEventListener("click", closeAddLeadModal);
  document.getElementById("modalBackdrop").addEventListener("click", (e) => {
    if (e.target.id === "modalBackdrop") closeAddLeadModal();
  });
  document.getElementById("formAddLead").addEventListener("submit", async (e) => {
    e.preventDefault();
    const phone = document.getElementById("addPhone").value.trim();
    const name = document.getElementById("addName").value.trim();
    const firstMessage = document.getElementById("addFirstMessage").value.trim();
    if (!phone || !firstMessage) return;
    try {
      const res = await fetch("/api/leads", {
        method: "POST",
        credentials: "include",
        headers: authHeaders(),
        body: JSON.stringify({ phone, name, firstMessage }),
      });
      const data = await res.json().catch(() => ({}));
      if (res.status === 409) {
        alert(t("duplicatePhone"));
        return;
      }
      if (!res.ok) throw new Error();
      closeAddLeadModal();
      await loadLeads();
    } catch (err) {
      alert(t("addLeadError"));
    }
  });
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") closeAddLeadModal();
  });
  document.getElementById("btnLang").addEventListener("click", () => {
    setLang(getLang() === "en" ? "he" : "en");
  });
  document.getElementById("search").addEventListener("input", renderTable);
  document.getElementById("statusFilter").addEventListener("change", renderTable);
  document.getElementById("btnPrint").addEventListener("click", () => window.print());
  document.getElementById("btnExportExcel").addEventListener("click", handleExportExcel);
  document.querySelectorAll("th[data-sort]").forEach((th) => {
    th.addEventListener("click", () => {
      const k = th.dataset.sort;
      if (th.classList.contains("nosort")) return;
      if (sortKey === k) sortDir = sortDir === "asc" ? "desc" : "asc";
      else {
        sortKey = k;
        sortDir = k === "createdAt" ? "desc" : "asc";
      }
      renderTable();
    });
  });
  document.getElementById("btnSaveToken").addEventListener("click", async () => {
    const v = document.getElementById("tokenInput").value.trim();
    if (!v) return;
    try {
      const res = await fetch("/api/auth/dashboard-session", {
        method: "POST",
        headers: { "Content-Type": "application/json", Accept: "application/json" },
        credentials: "include",
        body: JSON.stringify({ token: v }),
      });
      if (!res.ok) {
        alert(t("tokenSaveFailed"));
        return;
      }
      document.getElementById("tokenInput").value = "";
      updateQrLink();
      await loadLeads();
    } catch (err) {
      alert(t("tokenSaveFailed"));
    }
  });
  function updateQrLink() {
    const a = document.getElementById("linkQr");
    a.href = "/qr";
  }

  const initialLang = getLang();
  document.documentElement.lang = initialLang;
  document.body.classList.toggle("rtl", initialLang === "he");
  document.getElementById("tokenInput").value = "";
  applyI18n();
  (async function initDashboard() {
    await migrateUrlTokenToCookie();
    getToken();
    updateQrLink();
    await loadLeads();
  })();
})();
  </script>
</body>
</html>
